  captions: ["","En un planeta polsegós, tothom tenia set: flors músties, rius secs, animals cansats.","Ben amunt vivia en Nimbo, un núvol petit i tossut que guardava tota la seva pluja. —Si la deixo anar, em quedaré sense res —deia.","L'Orbi i en Chispa van pujar fins a ell amb el seu coet de llauna.","—Hola, Nimbo —va dir l'Orbi—. A baix tothom té set. No vols compartir una goteta? —Ni una! És meva.","—I si t'ensenyo un secret de l'aigua? —va dir l'Orbi—. Només deixa caure una gota. Una de petita.","En Nimbo va deixar caure una sola gota. Va caure sobre una flor mústia… i la flor va obrir els pètals. —Ho veus? <i>El que es comparteix mai no s'acaba.</i>","En Nimbo es va sorprendre: encara tenia gairebé tota la seva aigua, i a baix ja hi havia una flor feliç.","Animat, va deixar caure una pluja suau. Els rius van cantar, els animals van beure, els nens van xipollejar.","I llavors el sol va escalfar els bassals, el vapor va pujar al cel… i en Nimbo es va tornar a omplir d'aigua. —Ha tornat a mi! —<i>El que es comparteix mai no s'acaba.</i>","En Nimbo ho va entendre: l'aigua que regales no es perd; torna en forma de pluja, una vegada i una altra.","—La teva aigua no era per guardar-la —va dir l'Orbi—. Era per fer créixer la vida.","En Nimbo es va fer gran i generós, d'un blau brillant, repartint pluja allà on calia.","El planeta va florir: verd, fresc i ple de rialles. —Gràcies, Nimbo!","Aquesta nit, si tens alguna cosa bonica, recorda el que l'Orbi xiuxiueja: <i>el que es comparteix mai no s'acaba.</i>"]
